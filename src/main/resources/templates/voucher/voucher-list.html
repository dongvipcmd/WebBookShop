<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Voucher</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f7f6;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }

        /* Main */
        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .card-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .table-header-blue {
            background: linear-gradient(45deg, #0d6efd, #0a58ca);
            color: white;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="text-center py-4">
        <i class="fas fa-user-shield fa-3x text-warning"></i>
        <h5 class="mt-2 fw-bold">Admin</h5>
    </div>

    <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/authors"><i class="fas fa-user me-2"></i> Tác giả</a>
    <a href="/books"><i class="fas fa-book me-2"></i> Sách</a>
    <a href="/categories"><i class="fas fa-tags me-2"></i> Thể loại</a>

    <a href="/vouchers" class="active">
        <i class="fas fa-ticket-alt me-2"></i> Voucher
    </a>

    <hr class="mx-3">

    <a th:href="@{/home}">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <form th:action="@{/logout}" method="post" class="px-3 mt-2">
        <button type="submit" class="btn btn-link text-danger text-decoration-none">
            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
        </button>
    </form>
</div>

<!-- MAIN -->
<div class="main-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="fas fa-ticket-alt text-primary me-2"></i>
            Danh sách Voucher
        </h2>

        <a th:href="@{/vouchers/create}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i> Tạo mới
        </a>
    </div>

    <!-- TABLE -->
    <div class="card card-box">
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-header-blue">
                <tr>
                    <th>ID</th>
                    <th>Mã</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Đơn tối thiểu</th>
                    <th>Giảm tối đa</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="v : ${vouchers}">
                    <td th:text="${v.id}"></td>

                    <td>
                        <span class="badge bg-info text-dark" th:text="${v.code}"></span>
                    </td>

                    <td>
                        <span th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).DISCOUNT}"
                              class="badge bg-primary">Giảm giá</span>

                        <span th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).SHIPPING}"
                              class="badge bg-warning text-dark">Giảm ship</span>
                    </td>

                    <td>

                        <!-- DISCOUNT -->
                        <span th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).DISCOUNT}">

        <!-- % -->
        <span th:if="${v.discountType == T(com.example.demowebshop.enums.DiscountType).PERCENTAGE}"
              th:text="${v.discountPercent != null ? v.discountPercent + '%' : '-'}">
        </span>

                            <!-- tiền -->
        <span th:if="${v.discountType == T(com.example.demowebshop.enums.DiscountType).FIXED}"
              th:text="${v.discountValue != null ?
                  #numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT') + ' ₫' : '-'}">
        </span>

    </span>

                        <!-- SHIPPING -->
                        <span th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).SHIPPING}">
        <span th:text="${v.maxShippingDiscount != null ?
            #numbers.formatDecimal(v.maxShippingDiscount, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'Miễn phí ship'}">
        </span>
    </span>

                    </td>

                    <td th:text="${#numbers.formatDecimal(v.minOrderValue, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>

                    <td>
                        <span th:text="${v.maxDiscount != null ?
                            #numbers.formatDecimal(v.maxDiscount, 0, 'COMMA', 0, 'POINT') + ' ₫' : '-'}"></span>
                    </td>

                    <td>
                        <span th:if="${v.active}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${v.active}" class="badge bg-secondary">Tắt</span>
                    </td>

                    <td>
                        <a th:href="@{/vouchers/edit/{id}(id=${v.id})}"
                           class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>

                        <a th:href="@{/vouchers/delete/{id}(id=${v.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Bạn có chắc muốn xoá?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
