<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Form Voucher</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background-color: #f4f7f6;
    }

    /* Sidebar */
    .sidebar {
      height: 100vh;
      background: #212529;
      color: white;
      position: fixed;
      width: 240px;
    }

    .sidebar a {
      color: #adb5bd;
      padding: 12px 20px;
      display: block;
      text-decoration: none;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #343a40;
      color: #ffc107;
      border-left: 4px solid #ffc107;
    }

    /* Main */
    .main-content {
      margin-left: 240px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .form-container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      padding: 30px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="text-center py-4">
    <i class="fas fa-user-shield fa-3x text-warning"></i>
    <h5 class="mt-2 text-uppercase fw-bold">Admin</h5>
  </div>

  <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
  <a href="/authors"><i class="fas fa-user me-2"></i> Tác giả</a>
  <a href="/books"><i class="fas fa-book me-2"></i> Sách</a>
  <a href="/categories"><i class="fas fa-tags me-2"></i> Thể loại</a>

  <a href="/vouchers" class="active">
    <i class="fas fa-ticket-alt me-2"></i> Voucher
  </a>

  <hr class="mx-3">

  <a th:href="@{/home}">
    <i class="fas fa-home me-2"></i> Trang chủ
  </a>

  <form th:action="@{/logout}" method="post" class="px-3 mt-2">
    <button type="submit" class="btn btn-link text-danger text-decoration-none">
      <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
    </button>
  </form>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TITLE -->
  <div class="w-100 mb-4" style="max-width: 900px;">
    <h2 class="fw-bold">
      <i class="fas fa-ticket-alt text-primary me-2"></i>
      <span th:text="${voucher.id == null ? 'Tạo Voucher' : 'Sửa Voucher'}"></span>
    </h2>
  </div>

  <!-- FORM -->
  <div class="form-container">

    <form th:action="${voucher.id == null} ? @{/vouchers} : @{/vouchers/update/{id}(id=${voucher.id})}"
          th:object="${voucher}"
          method="post">

      <div class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Mã Voucher</label>
          <input type="text" class="form-control" th:field="*{code}" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Loại Voucher</label>
          <select class="form-select" th:field="*{voucherType}" id="voucherType">
            <option value="DISCOUNT">Giảm giá sản phẩm</option>
            <option value="SHIPPING">Giảm phí vận chuyển</option>
          </select>
        </div>

        <div class="col-md-6 mb-3 discount-field">
          <label class="form-label fw-semibold">Loại giảm giá</label>
          <select class="form-select" th:field="*{discountType}">
            <option value="PERCENTAGE">Theo %</option>
            <option value="FIXED">Số tiền</option>
          </select>
        </div>

        <div class="col-md-6 mb-3 discount-field">
          <label class="form-label fw-semibold">Giảm tiền (₫)</label>
          <input type="number" class="form-control" th:field="*{discountValue}">
        </div>

        <div class="col-md-6 mb-3 discount-field">
          <label class="form-label fw-semibold">Giảm (%)</label>
          <input type="number" class="form-control" th:field="*{discountPercent}">
        </div>

        <div class="col-md-6 mb-3 discount-field">
          <label class="form-label fw-semibold">Giảm tối đa</label>
          <input type="number" class="form-control" th:field="*{maxDiscount}">
        </div>

          <div class="col-md-6 mb-3 shipping-field">
          </div>

          <div class="col-md-6 mb-3">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Số lượng tối đa</label>
            <input type="number" class="form-control" th:field="*{totalQuantity}">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Ngày bắt đầu</label>
            <input type="date" class="form-control" th:field="*{startDate}">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Ngày kết thúc </label>
            <input type="date" class="form-control" th:field="*{endDate}">
          </div>

        <div class="col-md-6 mb-3 form-check">
          <input type="checkbox" class="form-check-input" th:field="*{active}">
          <label class="form-check-label">Đang hoạt động</label>
        </div>

      </div>

      <div class="d-flex justify-content-between mt-4">
        <a th:href="@{/vouchers}" class="btn btn-secondary">
          <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>

        <button type="submit" class="btn btn-success">
          <i class="fas fa-save me-1"></i> Lưu
        </button>
      </div>

    </form>

  </div>

</div>

<script>
  function toggleFields() {
    const type = document.getElementById("voucherType").value;

    document.querySelectorAll(".discount-field").forEach(el => {
      el.style.display = (type === "DISCOUNT") ? "block" : "none";
    });

    document.querySelectorAll(".shipping-field").forEach(el => {
      el.style.display = (type === "SHIPPING") ? "block" : "none";
    });
  }

  document.getElementById("voucherType").addEventListener("change", toggleFields);
  window.onload = toggleFields;
</script>

<script>
  function fillVoucher(code){
      const discountInput = document.querySelector('input[name="discountCode"]');
      const shippingInput = document.querySelector('input[name="shippingCode"]');

      if(code.startsWith("SHIP")){
          if(shippingInput) shippingInput.value = code;
      } else {
          if(discountInput) discountInput.value = code;
      }
  }
</script>

</body>
</html>
