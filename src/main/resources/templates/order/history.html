<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4">

    <h4 class="mb-4">Lịch sử đơn hàng</h4>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        Bạn chưa có đơn hàng nào. <a th:href="@{/books}">Mua sắm ngay</a>
    </div>

    <table class="table table-bordered align-middle" th:if="${!#lists.isEmpty(orders)}">
        <thead class="table-light">
        <tr>
            <th>Mã đơn</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Giảm giá</th>
            <th>Phí ship</th>
            <th>Thanh toán</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="'#' + ${order.id}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
            <td th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
            <td>
                <span th:if="${order.shippingDiscount != null and order.shippingDiscount > 0}"
                      th:text="${#numbers.formatDecimal(order.shippingFee.subtract(order.shippingDiscount), 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                </span>
                <span th:if="${order.shippingDiscount == null or order.shippingDiscount == 0}"
                      th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                </span>
            </td>
            <td><strong th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></strong></td>
            <td>
                <span class="badge"
                      th:classappend="${order.status == 'PAID'} ? 'bg-success' :
                                      (${order.status == 'CONFIRMED'} ? 'bg-primary' :
                                      (${order.status == 'SHIPPING'} ? 'bg-info' :
                                      (${order.status == 'DONE'} ? 'bg-secondary' : 'bg-warning text-dark')))"
                      th:text="${order.status}">
                </span>
            </td>
        </tr>
        </tbody>
    </table>

</div>
<div th:replace="~{fragment/footer :: footer}"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
