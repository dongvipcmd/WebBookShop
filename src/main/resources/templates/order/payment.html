<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thanh toán</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4" style="max-width: 600px">

    <h4 class="mb-4">Thanh toán</h4>


        <!-- THÔNG TIN KHÁCH -->
        <div class="card mb-3">
            <div class="card-body">

                <h5 class="mb-3">Thông tin khách hàng</h5>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Họ và tên</label>
                    <input type="text" name="fullname" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Số điện thoại</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Địa chỉ</label>
                    <input type="text" name="address" class="form-control" required>
                </div>

            </div>
        </div>

        <!-- THANH TOÁN -->
        <div class="card mb-3">
            <div class="card-body">

                <h5 class="mb-3">Phương thức thanh toán</h5>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="bank"
                           onclick="toggleBank(true)" required>
                    <label class="form-check-label">Chuyển khoản ngân hàng</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="cod"
                           onclick="toggleBank(false)">
                    <label class="form-check-label">Thanh toán khi nhận hàng (COD)</label>
                </div>

            </div>
        </div>

        <!-- THÔNG TIN NGÂN HÀNG -->
        <div id="bankInfo" class="card mb-3" style="display: none;">
            <div class="card-body text-center">

                <p class="text-muted mb-1">Mã đơn hàng</p>
                <h5 th:text="'#' + ${orderId}" class="mb-3"></h5>

                <p>Chuyển khoản đến:</p>
                <img th:src="@{/images/QRcode.jpg}"
                     alt="QR Code"
                     class="img-fluid rounded shadow-sm mb-3"
                     style="max-width: 220px;">
                <p class="fw-bold">VCB - STK: 123456789</p>

                <p class="text-muted">
                    Nội dung: <span th:text="'DH' + ${orderId}"></span>
                </p>

            </div>
        </div>

        <!-- Xác nhận đã thanh toán -->
        <form th:action="@{/payment/{id}/confirm(id=${orderId})}" method="post">
            <button class="btn btn-success w-100">Xác nhận đặt hàng</button>
        </form>
        <a th:href="@{/checkout}" class="btn btn-outline-secondary w-100 mt-2">Quay lại</a>

</div>

<div th:replace="~{fragment/footer :: footer}"></div>

<!-- JS -->
<script>
    function toggleBank(show) {
        document.getElementById("bankInfo").style.display = show ? "block" : "none";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
