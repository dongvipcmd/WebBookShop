<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4" style="max-width: 500px">

    <h4 class="mb-4">Thanh toán</h4>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-body text-center">

            <p class="text-muted mb-1">Mã đơn hàng</p>
            <h5 th:text="'#' + ${orderId}" class="mb-4"></h5>

            <p class="mb-1">Chuyển khoản đến tài khoản:</p>
            <p class="fw-bold">Ngân hàng: VCB — STK: 123456789</p>
            <p class="text-muted small">Nội dung: <span th:text="'DH' + ${orderId}"></span></p>

            <hr/>

            <!-- Xác nhận đã thanh toán -->
            <form th:action="@{/payment/{id}/confirm(id=${orderId})}" method="post">
                <button class="btn btn-success w-100">Tôi đã thanh toán</button>
            </form>

            <a th:href="@{/checkout}" class="btn btn-outline-secondary w-100 mt-2">Quay lại</a>
        </div>
    </div>

</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
