<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4">

    <h4 class="mb-4">Giỏ hàng</h4>


    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>


    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        Giỏ hàng trống. <a th:href="@{/shop}">Tiếp tục mua sắm</a>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Sách</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td class="d-flex align-items-center gap-2">
                    <img th:src="@{${item.book.image}}"
                         style="width:60px; height:80px; object-fit:cover;">

                    <span th:text="${item.book.name}"></span>
                </td>
                <td th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>

                <!-- Cập nhật số lượng -->
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center gap-2">
                        <input type="hidden" name="detailId" th:value="${item.id}"/>
                        <input type="number" name="quantity" th:value="${item.quantity}"
                               min="1" class="form-control form-control-sm" style="width:70px"/>
                        <button class="btn btn-sm btn-outline-secondary">Cập nhật</button>
                    </form>
                </td>

                <td th:text="${#numbers.formatDecimal(item.finalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>

                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="detailId" th:value="${item.id}"/>
                        <button class="btn btn-sm btn-danger">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>


        <div class="d-flex justify-content-end mb-3">
            <div class="text-end">
                <div>Tổng tiền hàng:
                    <strong th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></strong>
                </div>
                <div>Phí ship:
                    <strong th:text="${#numbers.formatDecimal(cart.shippingFee, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></strong>
                </div>
                <div class="fs-5 mt-1">Tạm tính:
                    <strong th:text="${#numbers.formatDecimal(cart.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></strong>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a th:href="@{/shop}" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
            <a th:href="@{/checkout}" class="btn btn-primary">Đặt hàng</a>
        </div>
    </div>

</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
