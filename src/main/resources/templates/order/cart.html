<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --light-bg: #f8f9fa;
            --ptit-red: #d32f2f;
        }

        body {
            background-color: var(--light-bg);
            color: #333;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-dark-custom {
            background-color: #212529 !important;
            padding: 0.8rem 0;
        }

        .main-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid #eee;
        }

        .book-img {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .table thead th {
            background-color: #f1f3f5;
            color: #495057;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .summary-box {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 1.5rem;
            border: 1px solid #dee2e6;
        }

        .btn-checkout {
            background-color: var(--ptit-red);
            border: none;
            padding: 12px;
            font-weight: 600;
            color: white;
            border-radius: 30px;
        }

        .btn-checkout:hover {
            background-color: #b71c1c;
            color: white;
            transform: translateY(-2px);
            transition: 0.2s;
        }
    </style>
</head>

<body>

   <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">
            <i class="bi bi-book-half me-2 text-white"></i>BOOKSTORE
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/shop}">Cửa hàng</a></li>
            </ul>
            <div class="navbar-nav align-items-center gap-3">
                <a class="nav-link position-relative" th:href="@{/cart}">
                    <i class="bi bi-cart3 fs-5 text-white"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:text="${#lists.size(cartItems)}">0</span>
                </a>
                <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Username</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Tài khoản</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-bag me-2"></i>Đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

    <div class="container">
        <div class="main-card">
            <h4 class="mb-4 fw-bold"><i class="bi bi-cart-check me-2 text-primary"></i>Giỏ hàng của bạn</h4>

            <div th:if="${#lists.isEmpty(cartItems)}" class="py-5 text-center">
                <i class="bi bi-cart-x display-1 text-muted"></i>
                <p class="mt-3 fs-5 text-secondary">Giỏ hàng đang trống</p>
                <a th:href="@{/shop}" class="btn btn-primary rounded-pill">Mua sắm ngay</a>
            </div>

            <div th:if="${!#lists.isEmpty(cartItems)}">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" class="form-check-input" id="selectAll"
                                        checked></th>
                                <th>Sản phẩm</th>
                                <th class="text-center">Đơn giá</th>
                                <th class="text-center">Số lượng</th>
                                <th class="text-end">Thành tiền</th>
                                <th class="text-center">Xóa</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cartItems}" class="cart-item">
                                <td><input type="checkbox" class="form-check-input item-checkbox" checked></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:src="@{${item.book?.image}}"
                                            onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'"
                                            class="book-img me-3 shadow-sm">
                                        <div>
                                            <div class="fw-bold text-dark mb-1" th:text="${item.book?.name}">Tên sách
                                            </div>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center fw-semibold text-secondary"
                                    th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                </td>
                                <td>
                                    <form th:action="@{/cart/update}" method="post"
                                        class="d-flex justify-content-center">
                                        <input type="hidden" name="detailId" th:value="${item.id}" />
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                            class="form-control form-control-sm text-center" style="width: 60px;">
                                        <button class="btn btn-sm btn-outline-primary ms-1 border-0"><i
                                                class="bi bi-arrow-repeat"></i></button>
                                    </form>
                                </td>
                                <td class="text-end fw-bold text-primary row-total-val"
                                    th:data-price="${item.finalPrice}"
                                    th:text="${#numbers.formatDecimal(item.finalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/cart/remove}" method="post">
                                        <input type="hidden" name="detailId" th:value="${item.id}" />
                                        <button class="btn btn-sm text-danger border-0 bg-transparent"><i
                                                class="bi bi-trash3 fs-5"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row mt-4">
                    <div class="col-md-7">
                        <a th:href="@{/shop}" class="text-decoration-none fw-bold text-primary"><i
                                class="bi bi-arrow-left"></i> Tiếp tục mua sắm</a>
                    </div>
                    <div class="col-md-5">
                        <div class="summary-box shadow-sm">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small fw-bold">TIỀN HÀNG (<span id="checked-count">0</span>
                                    món):</span>
                                <span id="subtotal-display" class="fw-bold">0 ₫</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3">
                                <span class="text-muted small fw-bold">PHÍ VẬN CHUYỂN:</span>
                                <span class="fw-bold">30.000 ₫</span>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-3">
                                <span class="fw-bold fs-5 text-dark">TỔNG CỘNG:</span>
                                <span id="final-total-display" class="fw-bold fs-4 text-danger">0 ₫</span>
                            </div>
                            <a th:href="@{/checkout}" class="btn btn-checkout w-100 mt-4">ĐẶT HÀNG NGAY</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHIP = 30000;
        const format = (n) => new Intl.NumberFormat('vi-VN').format(n) + ' ₫';

        function updateCartSummary() {
            let subtotal = 0;
            let count = 0;
            document.querySelectorAll('.item-checkbox:checked').forEach(cb => {
                const row = cb.closest('tr');
                const price = parseFloat(row.querySelector('.row-total-val').getAttribute('data-price'));
                subtotal += price;
                count++;
            });
            const total = subtotal > 0 ? (subtotal + SHIP) : 0;
            document.getElementById('checked-count').innerText = count;
            document.getElementById('subtotal-display').innerText = format(subtotal);
            document.getElementById('final-total-display').innerText = format(total);
        }

        document.querySelectorAll('.item-checkbox').forEach(cb => cb.addEventListener('change', updateCartSummary));
        document.getElementById('selectAll')?.addEventListener('change', function () {
            document.querySelectorAll('.item-checkbox').forEach(c => c.checked = this.checked);
            updateCartSummary();
        });
        window.onload = updateCartSummary;
    </script>
</body>

</html>
