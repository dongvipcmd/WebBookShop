<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đặt hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4">

    <h4 class="mb-4">Xác nhận đơn hàng</h4>


    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">

        <div class="col-md-7">
            <div class="card">
                <div class="card-header">Sản phẩm</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Sách</th>
                            <th>SL</th>
                            <th>Đơn giá</th>
                            <th>Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td class="d-flex align-items-center gap-2">
                                <img th:src="@{${item.book.image}}"
                                     style="width:60px; height:80px; object-fit:cover;">

                                <span th:text="${item.book.name}"></span>
                            </td>
                            <td th:text="${item.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                            <td th:text="${#numbers.formatDecimal(item.finalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${isLoggedIn}" class="mt-4">
                <h4 class="mb-4">Mã giảm giá dành cho bạn</h4>

                <div th:if="${vouchers != null and !#lists.isEmpty(vouchers)}">

                    <div th:each="v : ${vouchers}"
                         class="border rounded p-3 mb-2 shadow-sm voucher-item"
                         style="cursor:pointer"
                         th:onclick="'fillVoucher(\\'' + ${v.code} + '\\')'">

                        <!-- CODE -->
                        <div class="fw-bold text-primary mb-1" th:text="${v.code}"></div>

                        <!-- DISCOUNT -->
                        <div th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).DISCOUNT}">

                            <!-- % -->
                            <span th:if="${v.discountType == T(com.example.demowebshop.enums.DiscountType).PERCENTAGE}">
                    Giảm
                    <b th:text="${v.discountPercent} + '%'"></b>
                    <span th:if="${v.maxDiscount != null}">
                        (tối đa
                        <span th:text="${#numbers.formatDecimal(v.maxDiscount,0,'COMMA',0,'POINT')} + ' ₫'"></span>)
                    </span>
                </span>

                            <!-- tiền -->
                            <span th:if="${v.discountType == T(com.example.demowebshop.enums.DiscountType).FIXED}">
                    Giảm
                    <b th:text="${#numbers.formatDecimal(v.discountValue,0,'COMMA',0,'POINT')} + ' ₫'"></b>
                </span>
                        </div>

                        <!-- SHIPPING -->
                        <div th:if="${v.voucherType == T(com.example.demowebshop.enums.VoucherType).SHIPPING}">
                <span>
                    Giảm phí ship:
                    <b th:text="${v.maxShippingDiscount != null ?
                        #numbers.formatDecimal(v.maxShippingDiscount,0,'COMMA',0,'POINT') + ' ₫'
                        : 'Miễn phí'}">
                    </b>
                </span>
                        </div>

                        <!-- Điều kiện -->
                        <div class="small text-muted mt-1">
                            Đơn tối thiểu:
                            <span th:text="${#numbers.formatDecimal(v.minOrderValue,0,'COMMA',0,'POINT')} + ' ₫'"></span>
                        </div>

                    </div>

                </div>

                <div th:if="${vouchers == null or #lists.isEmpty(vouchers)}"
                     class="text-muted">
                    Không có voucher khả dụng
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card mb-3" th:if="${isLoggedIn}">
                <div class="card-header">Mã giảm giá</div>
                <div class="card-body">
                    <form th:action="@{/checkout/apply}" method="post">
                        <div class="mb-2">
                            <label class="form-label small">Mã giảm giá sản phẩm</label>
                            <div class="input-group">
                                <input type="text" name="discountCode" class="form-control form-control-sm"
                                       placeholder="Nhập mã..."
                                       th:value="${request.discountCode}"/>
                                <button class="btn btn-sm btn-outline-primary">Áp dụng</button>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Mã giảm phí ship</label>
                            <div class="input-group">
                                <input type="text" name="shippingCode" class="form-control form-control-sm"
                                       placeholder="Nhập mã..."
                                       th:value="${request.shippingCode}"/>
                                <button class="btn btn-sm btn-outline-primary">Áp dụng</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>


            <div class="alert alert-info py-2 small" th:if="${!isLoggedIn}">
                <a th:href="@{/login}">Đăng nhập</a> để sử dụng mã giảm giá
            </div>

            <!-- Tổng tiền -->
            <div class="card">
                <div class="card-header">Tổng thanh toán</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-1">
                        <span>Tổng tiền hàng</span>
                        <span th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <div class="d-flex justify-content-between mb-1 text-success"
                         th:if="${cart.discountAmount != null and cart.discountAmount > 0}">
                        <span>Giảm giá</span>
                        <span th:text="'- ' + ${#numbers.formatDecimal(cart.discountAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <div class="d-flex justify-content-between mb-1">
                        <span>Phí ship</span>
                        <span th:text="${#numbers.formatDecimal(cart.shippingFee, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <div class="d-flex justify-content-between mb-1 text-success"
                         th:if="${cart.shippingDiscount != null and cart.shippingDiscount > 0}">
                        <span>Giảm ship</span>
                        <span th:text="'- ' + ${#numbers.formatDecimal(cart.shippingDiscount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <hr/>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Tổng thanh toán</span>
                        <span th:text="${#numbers.formatDecimal(cart.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <!-- Xác nhận đặt hàng -->
                    <form th:action="@{/checkout/place}" method="post" class="mt-3">
                        <button class="btn btn-success w-100">Đặt hàng</button>
                    </form>

                    <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-2">Quay lại giỏ hàng</a>
                </div>
            </div>

        </div>
    </div>

</div>
<div th:replace="~{fragment/footer :: footer}"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
