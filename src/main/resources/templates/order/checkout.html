<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đặt hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-4">
    <h4 class="mb-4">Xác nhận đơn hàng</h4>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-md-7">

            <div class="card mb-4">
                <div class="card-header bg-primary text-white">Thông tin giao hàng</div>
                <div class="card-body">
                    <form th:action="@{/checkout/place}" method="post" id="placeOrderForm">

                        <div class="mb-3">
                            <label class="form-label">Họ và tên người nhận <span class="text-danger">*</span></label>
                            <input type="text" name="customerName" class="form-control" required
                                   placeholder="Nhập họ tên..." th:value="${request.customerName}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" name="phoneNumber" class="form-control" required
                                   placeholder="Nhập số điện thoại..." th:value="${request.phoneNumber}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                            <textarea name="shippingAddress" class="form-control" rows="3" required
                                      placeholder="Nhập địa chỉ chi tiết..." th:text="${request.shippingAddress}"></textarea>
                        </div>

                    </form> </div>
            </div>

            <div class="card">
                <div class="card-header">Sản phẩm trong giỏ</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Sách</th>
                            <th>SL</th>
                            <th>Đơn giá</th>
                            <th>Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td class="d-flex align-items-center gap-2">
                                <img th:src="@{${item.book.image}}" style="width:60px; height:80px; object-fit:cover;">
                                <span th:text="${item.book.name}"></span>
                            </td>
                            <td th:text="${item.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                            <td th:text="${#numbers.formatDecimal(item.finalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card mb-3" th:if="${isLoggedIn}">
                <div class="card-header">Mã giảm giá</div>
                <div class="card-body">
                    <form th:action="@{/checkout/apply}" method="post">
                        <div class="mb-2">
                            <label class="form-label small">Mã giảm giá sản phẩm</label>
                            <div class="input-group">
                                <input type="text" name="discountCode" class="form-control form-control-sm" th:value="${request.discountCode}"/>
                                <button class="btn btn-sm btn-outline-primary">Áp dụng</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Tổng thanh toán</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-1">
                        <span>Tổng tiền hàng</span>
                        <span th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-1">
                        <span>Phí ship</span>
                        <span th:text="${#numbers.formatDecimal(cart.shippingFee, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>
                    <hr/>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Tổng thanh toán</span>
                        <span th:text="${#numbers.formatDecimal(cart.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <button type="submit" form="placeOrderForm" class="btn btn-success w-100 mt-3 fs-5">Xác nhận Đặt hàng</button>

                    <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-2">Quay lại giỏ hàng</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
