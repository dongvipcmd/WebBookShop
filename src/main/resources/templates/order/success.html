<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container py-5 text-center" style="max-width: 500px">

    <div class="mb-3" style="font-size: 4rem">✓</div>
    <h4 class="mb-2">Đặt hàng thành công!</h4>
    <p class="text-muted">Mã đơn hàng: <strong th:text="'#' + ${orderId}"></strong></p>
    <p class="text-muted small">Cảm ơn bạn đã mua hàng. Đơn hàng sẽ được xử lý sớm nhất có thể.</p>

    <div class="d-flex justify-content-center gap-2 mt-4">
        <a th:href="@{/books}" class="btn btn-primary">Tiếp tục mua sắm</a>
        <a th:href="@{/order/history}" class="btn btn-outline-secondary">Lịch sử đơn hàng</a>
    </div>

</div>
</body>
<div th:replace="~{fragment/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
