<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Chi tiết sách</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container mt-5">

  <div class="book-container">

    <div class="row">


      <div class="col-md-5 text-center">
        <img th:src="${book.image != null and book.image != ''} ? ${book.image} : 'https://via.placeholder.com/300'"
             class="book-img"/>
      </div>


      <div class="col-md-7">

        <h2 class="book-title" th:text="${book.name}"></h2>

        <p class="meta">
          <strong>Tác giả:</strong>
          <span th:text="${book.author.fullName}"></span>
        </p>

        <p class="meta">
          <strong>Thể loại:</strong>
          <span th:text="${book.category.name}"></span>
        </p>

        <p class="price"
           th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
        </p>

        <p class="meta">
          <strong>Còn lại:</strong>
          <span th:text="${book.stockQuantity}"></span> sản phẩm
        </p>

        <hr>


        <h5>Mô tả</h5>
        <p th:text="${book.description}"></p>

        <hr>


        <form th:action="@{/cart/add}" method="post">

          <input type="hidden" name="bookId" th:value="${book.id}" />

          <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number"
                   name="quantity"
                   value="1"
                   min="1"
                   th:max="${book.stockQuantity}"
                   class="form-control"
                   style="width: 120px;">
          </div>

          <button type="submit" class="btn btn-buy">
            Thêm vào giỏ
          </button>

          <a th:href="@{/shop}" class="btn btn-outline-secondary">Quay lại</a>

        </form>

      </div>

    </div>

  </div>

</div>
</body>
</html>
