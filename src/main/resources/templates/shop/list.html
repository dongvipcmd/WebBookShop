<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sách</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        .book-card {
            transition: 0.3s;
            cursor: pointer;
        }

        .book-card:hover {
            transform: scale(1.05);
        }

        .book-img {
            height: 250px;
            object-fit: cover;
        }

        .price {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4 text-center">Danh sách sản phẩm</h2>

    <div class="row">

        <div class="col-md-3 mb-4" th:each="b : ${books}">
            <div class="card book-card"
                 th:onclick="|window.location.href='/shop/${b.id}'|">

                <!-- ẢNH -->
                <img th:src="${b.image != null} ? ${b.image} : 'https://via.placeholder.com/200'" />

                <div class="card-body">

                    <h6 class="card-title" th:text="${b.name}"></h6>

                    <p class="price"
                       th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    </p>

                    <small>
                        Tác giả:
                        <span th:text="${b.author.fullName}"></span>
                    </small>

                    <br>

                    <small>
                        Thể loại:
                        <span th:text="${b.category.name}"></span>
                    </small>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
