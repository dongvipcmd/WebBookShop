<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .book-card { transition: 0.3s; cursor: pointer; }
        .book-card:hover { transform: scale(1.05); }
        .book-img { height: 250px; object-fit: cover; }
        .price { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4 text-center">Danh sách sản phẩm</h2>

    <div class="row">
        <div class="col-md-3">
            <form action="/shop" method="get" class="card p-3 shadow-sm">
                <h5 class="mb-3">Bộ lọc sản phẩm</h5>

                <div class="mb-3">
                    <label class="form-label fw-bold">Sắp xếp theo:</label>
                    <select name="sortBy" class="form-select">
                        <option value="newest" th:selected="${currentSortBy == 'newest'}">Mới nhất</option>
                        <option value="bestSelling" th:selected="${currentSortBy == 'bestSelling'}">Bán chạy nhất</option>
                        <option value="priceAsc" th:selected="${currentSortBy == 'priceAsc'}">Giá: Thấp đến Cao</option>
                        <option value="priceDesc" th:selected="${currentSortBy == 'priceDesc'}">Giá: Cao đến Thấp</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Thể loại:</label>
                    <select name="categoryId" class="form-select">
                        <option value="">Tất cả thể loại</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${currentCategoryId == c.id}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tác giả:</label>
                    <select name="authorId" class="form-select">
                        <option value="">Tất cả tác giả</option>
                        <option th:each="a : ${authors}"

                                th:value="${a.id}"

                                th:text="${a.fullName}"

                                th:selected="${currentAuthorId == a.id}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mức giá tối đa (₫):</label>
                    <input type="number" name="maxPrice" class="form-control"
                           placeholder="VD: 500000" min="0" step="1000"
                           th:value="${currentMaxPrice}">
                </div>


                <button type="submit" class="btn btn-primary w-100">Lọc kết quả</button>
                <a href="/shop" class="btn btn-outline-secondary w-100 mt-2">Xóa lọc</a>
            </form>
        </div>

        <div class="col-md-9">
            <div class="row">
                <div th:if="${#lists.isEmpty(books)}" class="col-12 text-center text-muted">
                    <p>Không tìm thấy sản phẩm nào phù hợp với bộ lọc.</p>
                </div>

                <div class="col-md-4 mb-4" th:each="b : ${books}">
                    <div class="card book-card h-100"
                         th:onclick="|window.location.href='/shop/${b.id}'|">
                        <img th:src="${b.image != null} ? ${b.image} : 'https://via.placeholder.com/200'" class="card-img-top book-img" />

                        <div class="card-body">
                            <h6 class="card-title" th:text="${b.name}"></h6>
                            <p class="price"
                               th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            </p>
                            <small>
                                Tác giả: <span th:text="${b.author != null ? b.author.fullName : 'Đang cập nhật'}"></span>
                            </small><br>
                            <small>
                                Thể loại: <span th:text="${b.category != null ? b.category.name : 'Đang cập nhật'}"></span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragment/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
