<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Author Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f7f6;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }

        /* Main */
        .main-content {
            margin-left: 240px;
            padding: 40px;

            display: flex;
            flex-direction: column;
            align-items: center; /* ⭐ căn giữa */
        }

        /* Form */
        .form-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="text-center py-4">
        <i class="fas fa-user-shield fa-3x text-warning"></i>
        <h5 class="mt-2 fw-bold">Admin</h5>
    </div>

    <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/authors" class="active"><i class="fas fa-user me-2"></i> Tác giả</a>
    <a href="/books"><i class="fas fa-book me-2"></i> Sách</a>
    <a href="/categories"><i class="fas fa-tags me-2"></i> Thể loại</a>

    <hr class="mx-3">

    <a th:href="@{/home}">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <form th:action="@{/logout}" method="post" class="px-3">
        <button type="submit" class="btn btn-link text-danger text-decoration-none">
            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
        </button>
    </form>
</div>

<!-- Main -->
<div class="main-content">

    <!-- Title -->
    <div class="w-100 mb-4" style="max-width: 700px;">
        <h2 class="fw-bold">
            <i class="fas fa-user-edit text-primary me-2"></i>
            <span th:text="${author.id} == null ? 'Thêm tác giả' : 'Sửa tác giả'"></span>
        </h2>
    </div>

    <!-- Form -->
    <div class="form-container">

        <form th:action="${author.id} == null ? @{/authors} : @{/authors/update/{id}(id=${author.id})}"
              method="post"
              th:object="${author}">

            <input type="hidden" th:field="*{id}" />

            <!-- Tên -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Tên tác giả</label>
                <input type="text" class="form-control" th:field="*{fullName}" required>
            </div>

            <!-- Ngày sinh -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dob}">
            </div>

            <!-- Tiểu sử -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Tiểu sử</label>
                <textarea class="form-control" rows="4" th:field="*{bio}"></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Lưu
                </button>

                <a th:href="@{/authors}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại
                </a>
            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
