<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Của Tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
        }
    </style>
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container profile-container mb-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
            <h3 class="mb-0 text-center fw-bold" style="color: #e3001b;">Hồ Sơ Của Tôi</h3>
            <p class="text-center text-muted mt-2">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
        </div>
        <div class="card-body p-4">
            
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/profile/update}" method="post" th:object="${user}">
                
                <div class="row mb-3">
                    <label class="col-sm-3 col-form-label text-end text-muted">Tên đăng nhập</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control-plaintext fw-bold" th:value="${user.username}" readonly>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="name" class="col-sm-3 col-form-label text-end">Tên hiển thị</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="email" class="col-sm-3 col-form-label text-end">Email</label>
                    <div class="col-sm-9">
                        <input type="email" class="form-control" id="email" th:field="*{email}">
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="phoneNumber" class="col-sm-3 col-form-label text-end">Số điện thoại</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-3 col-form-label text-end">Giới tính</label>
                    <div class="col-sm-9 d-flex align-items-center">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{gender}" id="genderMale" value="Nam">
                            <label class="form-check-label" for="genderMale">Nam</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{gender}" id="genderFemale" value="Nữ">
                            <label class="form-check-label" for="genderFemale">Nữ</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{gender}" id="genderOther" value="Khác">
                            <label class="form-check-label" for="genderOther">Khác</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="dob" class="col-sm-3 col-form-label text-end">Ngày sinh</label>
                    <div class="col-sm-9">
                        <input type="date" class="form-control" id="dob" th:field="*{dob}">
                    </div>
                </div>
                
                <div class="row mb-4">
                    <label for="address" class="col-sm-3 col-form-label text-end">Địa chỉ</label>
                    <div class="col-sm-9">
                        <textarea class="form-control" id="address" th:field="*{address}" rows="2"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-9 offset-sm-3">
                        <button type="submit" class="btn btn-danger px-4 py-2" style="background-color: #e3001b;">Lưu Bổ Sung</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
