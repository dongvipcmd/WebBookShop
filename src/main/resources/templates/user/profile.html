<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ptit-red: #336594;
            --bg-body: #f4f7f6;
            --text-dark: #2d3436;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar Dark đồng bộ */
        .navbar-dark-custom {
            background-color: #1a1c1e !important;
        }

        /* Profile Card Styling */
        .card-custom {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .profile-cover {
            background: linear-gradient(135deg, #1a1c1e 0%, #d32f2f 100%);
            height: 120px;
        }

        .avatar-container {
            margin-top: -60px;
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar-box {
            width: 110px;
            height: 110px;
            background: #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--ptit-red);
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Tabs Styling */
        .nav-pills-custom .nav-link {
            color: #636e72;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-pills-custom .nav-link.active {
            background-color: var(--ptit-red);
            color: #fff;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.2);
        }

        .nav-pills-custom .nav-link:hover:not(.active) {
            background-color: #eee;
        }

        /* Form Styling */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #636e72;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dfe6e9;
            background-color: #fdfdfd;
        }

        .form-control:focus {
            border-color: var(--ptit-red);
            box-shadow: 0 0 0 0.25rem rgba(211, 47, 47, 0.05);
        }

        .btn-update {
            background: var(--ptit-red);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: bold;
            color: #fff;
            transition: 0.3s;
        }

        .btn-update:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        .section-title {
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #2d3436;
            border-left: 5px solid var(--ptit-red);
            padding-left: 15px;
        }

        .dropdown-toggle::after {
            display: none !important;
        }
    </style>
</head>

<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">
                <i class="bi bi-book-half me-2"></i>BOOKSTORE
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/shop}">Cửa hàng</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Thể loại
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="c : ${categories}">
                                <a class="dropdown-item" th:text="${c.name}" th:href="@{/shop(categoryId=${c.id})}">
                                </a>
                            </li>

                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/shop}">Tất cả</a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Liên hệ</a>
                    </li>
                </ul>

                <div class="navbar-nav align-items-center">
                    <a class="nav-link position-relative me-3" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">Username</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-lg-3">
                <div class="card-custom p-3">
                    <div class="nav flex-column nav-pills nav-pills-custom" id="profileTabs" role="tablist">
                        <button class="nav-link active" id="info-tab" data-bs-toggle="pill" data-bs-target="#info-pane"
                            type="button">
                            <i class="bi bi-person-lines-fill me-2"></i>Thông tin chung
                        </button>
                            <a th:href="@{/user/change-password}" class="nav-link">
                                <i class="bi bi-key-fill me-2"></i>Đổi mật khẩu
                            </a>
                        <a th:href="@{/order/history}" class="nav-link">
                            <i class="bi bi-clock-history me-2"></i>Lịch sử mua hàng
                        </a>
                        <hr class="text-muted">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="nav-link text-danger border-0 bg-transparent w-100 text-start">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4"
                    role="alert" style="border-radius: 12px; background-color: #d1e7dd; color: #0f5132;">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                        <strong th:text="${success}"></strong>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4"
                    role="alert" style="border-radius: 12px; background-color: #f8d7da; color: #842029;">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                        <strong th:text="${error}"></strong>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div class="tab-content">

                    <div class="tab-pane fade show active" id="info-pane">
                        <div class="card-custom">
                            <div class="profile-cover"></div>
                            <div class="avatar-container">
                                <div class="avatar-box"> <i class="bi bi-person-fill"></i> </div>
                                <h4 class="fw-bold mt-2" th:text="${user.name}">Họ tên User</h4>
                                <p class="text-muted small" th:text="${user.email}">user@example.com</p>
                            </div>

                            <div class="card-body px-4 pb-4">
                                <h5 class="section-title">Chỉnh sửa hồ sơ</h5>
                                <form th:action="@{'/user/update-info/' + ${user.id}}" method="post"
                                    th:object="${user}">
                                    <div class="row g-4">
                                        <div class="col-md-6">
                                            <label class="form-label">Họ và tên</label>
                                            <input type="text" th:field="*{name}" class="form-control" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Email cá nhân</label>
                                            <input type="email" th:field="*{email}" class="form-control" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Số điện thoại</label>
                                            <input type="text" th:field="*{phoneNumber}" class="form-control">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Giới tính</label>
                                            <select th:field="*{gender}" class="form-select">
                                                <option value="Nam">Nam</option>
                                                <option value="Nữ">Nữ</option>
                                                <option value="Khác">Khác</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Ngày sinh</label>
                                            <input type="date" th:field="*{dob}" class="form-control">
                                        </div>
                                        <div class="col-md-12">
                                            <label class="form-label">Địa chỉ thường trú</label>
                                            <textarea th:field="*{address}" class="form-control" rows="3"
                                                placeholder="Số nhà, tên đường, phường/xã..."></textarea>
                                        </div>
                                        <div class="col-12 text-end mt-4">
                                            <button type="submit" class="btn btn-update px-5">LƯU CẬP NHẬT</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function (alert) {
                setTimeout(function () {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 4000);
            });
        });
    </script>
</body>

</html>
