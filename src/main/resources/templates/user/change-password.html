<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu | Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .d-flex {
            min-height: calc(1.5em + .5rem + calc(var(--bs-border-width) * 2)) !important;
            padding: .25rem .5rem !important;
            font-size: .875rem !important;
            border-radius: var(--bs-border-radius-sm) !important;
        }
        :root { --ptit-red: #336594; --bg-body: #f4f7f6; --text-dark: #2d3436; }
        body { background-color: var(--bg-body); color: var(--text-dark); font-family: 'Segoe UI', sans-serif; }
        .navbar-dark-custom { background-color: #1a1c1e !important; border-bottom: 2px solid var(--ptit-red); }
        .card-custom { border: none; border-radius: 16px; background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 2rem; }
        .nav-pills-custom .nav-link { color: #636e72; font-weight: 600; padding: 12px 20px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; text-align: left; }
        .nav-pills-custom .nav-link.active { background-color: var(--ptit-red); color: #fff; box-shadow: 0 4px 12px rgba(211, 47, 47, 0.2); }
        .section-title { font-weight: 800; font-size: 1.25rem; margin-bottom: 1.5rem; color: #2d3436; border-left: 5px solid var(--ptit-red); padding-left: 15px; }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #636e72; text-transform: uppercase; margin-bottom: 8px; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #dfe6e9; }
        .btn-update { background: var(--ptit-red); border: none; border-radius: 10px; padding: 12px 30px; font-weight: bold; color: #fff; width: fit-content; }
        .btn-update:hover { background: #b71c1c; transform: translateY(-2px); }
        .nav-pills-custom .nav-link:hover:not(.active) {
            background-color: #eee;
        }
        .dropdown-toggle::after {
            display: none !important;
        }
    </style>
</head>
<body>
        <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">
                <i class="bi bi-book-half me-2"></i>BOOKSTORE
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/shop}">Cửa hàng</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Thể loại
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="c : ${categories}">
                                <a class="dropdown-item" th:text="${c.name}" th:href="@{/shop(categoryId=${c.id})}">
                                </a>
                            </li>

                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/shop}">Tất cả</a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Liên hệ</a>
                    </li>
                </ul>

                <div class="navbar-nav align-items-center">
                    <a class="nav-link position-relative me-3" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span sec:authentication="name">Username</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
 

<div class="container my-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="card-custom p-3" style="padding: 1rem !important;">
                <div class="nav flex-column nav-pills nav-pills-custom">
                    <a th:href="@{/user/profile}" class="nav-link">
                        <i class="bi bi-key-fill me-2"></i>Thông tin chung
                    </a>
                    <button class="nav-link active" id="info-tab" data-bs-toggle="pill" data-bs-target="#info-pane"
                            type="button">
                            <i class="bi bi-person-lines-fill me-2"></i>Đổi mật khẩu
                        </button>
                    <a th:href="@{/order/history}" class="nav-link">
                        <i class="bi bi-clock-history me-2"></i>Lịch sử mua hàng
                    </a>
                    <hr class="text-muted">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="nav-link text-danger border-0 bg-transparent w-100 text-start">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </form>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4"
                    role="alert" style="border-radius: 12px; background-color: #d1e7dd; color: #0f5132;">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                        <strong th:text="${success}"></strong>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4"
                    role="alert" style="border-radius: 12px; background-color: #f8d7da; color: #842029;">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                        <strong th:text="${error}"></strong>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            <div class="card-custom">
                <h5 class="section-title">Thiết lập mật khẩu mới</h5>
                <form th:action="@{/user/change-password/{id}(id=${user.id})}" method="post">
                    <div class="row g-4">
                        <div class="col-md-7">
                            <label class="form-label">Mật khẩu hiện tại</label>
                            <input type="password" name="oldPassword" class="form-control" required>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-update">XÁC NHẬN ĐỔI MẬT KHẨU</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
        document.addEventListener("DOMContentLoaded", function () {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function (alert) {
                setTimeout(function () {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 4000);
            });
        });
    </script>
</body>
</html>
