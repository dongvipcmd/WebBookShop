<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .password-container {
            max-width: 600px;
            margin: 40px auto;
        }
    </style>
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container password-container mb-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
            <h3 class="mb-0 text-center fw-bold" style="color: #e3001b;">Đổi Mật Khẩu</h3>
            <p class="text-center text-muted mt-2">Để bảo mật tài khoản, vui lòng không chia sẻ mật khẩu cho người khác</p>
        </div>
        <div class="card-body p-4">
            
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/profile/change-password}" method="post">
                
                <div class="mb-3">
                    <label for="oldPassword" class="form-label">Mật khẩu hiện tại</label>
                    <input type="password" class="form-control" id="oldPassword" name="oldPassword" required>
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label">Mật khẩu mới</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger py-2" style="background-color: #e3001b;">Xác Nhận</button>
                    <a href="/profile" class="btn btn-outline-secondary py-2">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragment/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
