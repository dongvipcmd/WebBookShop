<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Category Form</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
        background-color: #f4f7f6;
    }

    /* Sidebar */
    .sidebar {
        height: 100vh;
        background: #212529;
        position: fixed;
        width: 240px;
        color: white;
    }

    .sidebar a {
        color: #adb5bd;
        padding: 12px 20px;
        display: block;
        text-decoration: none;
    }

    .sidebar a:hover,
    .sidebar a.active {
        background: #343a40;
        color: #ffc107;
        border-left: 4px solid #ffc107;
    }

    /* Main */
    .main-content {
        margin-left: 240px;
        padding: 40px;

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Form box */
    .form-container {
        width: 100%;
        max-width: 600px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        padding: 30px;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="text-center py-4">
    <i class="fas fa-user-shield fa-3x text-warning"></i>
    <h5 class="mt-2 text-uppercase fw-bold">Admin</h5>
  </div>

  <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
  <a href="/authors"><i class="fas fa-user me-2"></i> Tác giả</a>
  <a href="/books"><i class="fas fa-book me-2"></i> Sách</a>
  <a href="/categories" class="active"><i class="fas fa-tags me-2"></i> Thể loại</a>
  <a href="/vouchers">
    <i class="fas fa-ticket-alt me-2"></i> Voucher
  </a>

  <hr class="mx-3">

  <a th:href="@{/home}">
    <i class="fas fa-home me-2"></i> Trang chủ
  </a>

  <!-- Logout -->
  <form th:action="@{/logout}" method="post" class="px-3">
    <button type="submit" class="btn btn-link text-danger text-decoration-none">
      <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
    </button>
  </form>
</div>

<!-- Main -->
<div class="main-content">

  <!-- Title -->
  <div class="w-100 mb-4" style="max-width: 600px;">
    <h2 class="fw-bold">
      <i class="fas fa-tags text-primary me-2"></i>
      <span th:text="${category.id} == null ? 'Thêm thể loại' : 'Sửa thể loại'"></span>
    </h2>
  </div>

  <!-- Form -->
  <div class="form-container">

    <form th:action="${category.id} == null ? @{/categories} : @{/categories/update/{id}(id=${category.id})}"
          method="post"
          th:object="${category}">

      <input type="hidden" th:field="*{id}" />

      <!-- Name -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Tên thể loại</label>
        <input type="text" class="form-control" th:field="*{name}" required>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Mô tả</label>
        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save me-1"></i> Lưu
        </button>

        <a th:href="@{/categories}" class="btn btn-secondary">
          <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>
      </div>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
