<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">
            <i class="bi bi-book-half me-2"></i>BOOKSTORE
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/shop}">Cửa hàng</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Thể loại
                    </a>
                    <ul class="dropdown-menu">
                        <li th:each="c : ${categories}">
                            <a class="dropdown-item"
                               th:text="${c.name}"
                               th:href="@{/shop(categoryId=${c.id})}">
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/shop}">Tất cả</a>
                        </li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Liên hệ</a>
                </li>
            </ul>

            <form class="d-flex me-3 position-relative" role="search" th:action="@{/shop}" method="get">
                <div class="input-group">
                    <input class="form-control form-control-sm" type="search" name="keyword" id="searchInput" placeholder="Tìm tên sách..." autocomplete="off">
                    <button class="btn btn-outline-light btn-sm" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>

                <ul id="searchResults" class="dropdown-menu w-100 shadow" style="display: none; position: absolute; top: 100%; left: 0; z-index: 1050; padding: 0; max-height: 400px; overflow-y: auto;">
                </ul>
            </form>

            <script th:inline="javascript">
                document.addEventListener("DOMContentLoaded", function() {
                    const searchInput = document.getElementById("searchInput");
                    const searchResults = document.getElementById("searchResults");
                    let timeout = null;

                    if (searchInput) {
                        searchInput.addEventListener("input", function() {
                            clearTimeout(timeout);
                            const keyword = this.value.trim();

                            // Xoá nội dung thì ẩn dropdown
                            if (keyword.length === 0) {
                                searchResults.style.display = "none";
                                return;
                            }

                            // Debounce 300ms: Đợi người dùng ngừng gõ 300ms mới gọi API để đỡ quá tải
                            timeout = setTimeout(() => {
                                fetch(`/shop/api/search?keyword=${encodeURIComponent(keyword)}`)
                                    .then(response => response.json())
                                    .then(data => {
                                        searchResults.innerHTML = "";

                                        if (data.length === 0) {
                                            searchResults.innerHTML = '<li class="dropdown-item text-muted text-center py-2">Không tìm thấy sách</li>';
                                        } else {
                                            data.forEach(book => {
                                                const li = document.createElement("li");
                                                // Format giá tiền theo định dạng Việt Nam
                                                const priceFormat = new Intl.NumberFormat('vi-VN').format(book.price) + ' ₫';
                                                const imageSrc = book.image ? book.image : 'https://via.placeholder.com/50';

                                                li.innerHTML = `
                                                    <a class="dropdown-item d-flex align-items-center py-2 border-bottom" href="/shop/${book.id}">
                                                        <img src="${imageSrc}" style="width: 40px; height: 55px; object-fit: cover; margin-right: 12px; border-radius: 4px;">
                                                        <div style="overflow: hidden;">
                                                            <div class="text-truncate fw-semibold" style="max-width: 250px; font-size: 14px;">${book.name}</div>
                                                            <div class="text-danger small fw-bold">${priceFormat}</div>
                                                        </div>
                                                    </a>`;
                                                searchResults.appendChild(li);
                                            });
                                        }
                                        searchResults.style.display = "block";
                                    })
                                    .catch(err => console.error("Lỗi tìm kiếm:", err));
                            }, 300);
                        });

                        // Ẩn dropdown khi click ra vùng khác ngoài ô input và kết quả
                        document.addEventListener("click", function(e) {
                            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                                searchResults.style.display = "none";
                            }
                        });
                    }
                });
            </script>

            <div class="navbar-nav align-items-center">
                <a class="nav-link position-relative me-3" th:href="@{/cart}">
                    <i class="bi bi-cart3 fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span> </a>

                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm">Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-primary btn-sm px-3">Đăng ký</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Username</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Tài khoản</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-bag me-2"></i>Đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div> </div>
    </div>
</nav>

</body>
</html>
