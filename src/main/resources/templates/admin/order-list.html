<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container mt-5">
    <h3 class="mb-4">Danh sách đơn hàng hệ thống</h3>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Khách hàng</th>
            <th>SĐT</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>PTTT</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="'#' + ${o.id}"></td>
            <td th:text="${o.customerName}"></td>
            <td th:text="${o.phoneNumber}"></td>
            <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#numbers.formatDecimal(o.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
            <td th:text="${o.paymentMethod}"></td>
            <td><span class="badge bg-success" th:text="${o.status}"></span></td>
            <td>
                <a th:href="@{/admin/orders/detail/{id}(id=${o.id})}" class="btn btn-sm btn-info text-white">Xem</a>

                <form th:action="@{/admin/orders/delete/{id}(id=${o.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa đơn hàng này?')">
                    <button class="btn btn-sm btn-danger">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
