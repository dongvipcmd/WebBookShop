<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:replace="~{fragment/fragments :: navbar}"></div>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-receipt"></i> Chi tiết đơn hàng <span th:text="'#' + ${order.id}"></span></h3>
        <a href="/admin/orders" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Quay lại danh sách</a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Thông tin giao hàng</h5>
                </div>
                <div class="card-body">
                    <p><strong>Người nhận:</strong> <span th:text="${order.customerName}"></span></p>
                    <p><strong>Số điện thoại:</strong> <span th:text="${order.phoneNumber}"></span></p>
                    <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress}"></span></p>
                    <p><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                    <p><strong>Thanh toán:</strong> <span class="badge bg-info" th:text="${order.paymentMethod}"></span></p>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="card-title mb-0">Sản phẩm trong đơn</h5>
                </div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-end">Đơn giá</th>
                            <th class="text-end">Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${items}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:src="${item.book.image}" alt=""
                                         style="width: 40px; height: 60px; object-fit: cover;" class="me-2 shadow-sm">

                                    <span th:text="${item.book.name}"></span>
                                </div>
                            </td>
                            <td class="text-center" th:text="${item.quantity}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(item.finalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr>
                            <td colspan="3" class="text-end">Tổng tiền hàng:</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        <tr>
                            <td colspan="3" class="text-end text-danger">Giảm giá:</td>
                            <td class="text-end text-danger" th:text="'- ' + ${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        <tr>
                            <td colspan="3" class="text-end">Phí vận chuyển:</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        <tr class="table-warning">
                            <td colspan="3" class="text-end fw-bold">TỔNG THANH TOÁN:</td>
                            <td class="text-end fw-bold text-primary h5" th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
