<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book for life</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragment/fragments :: navbar}"></div>

<header class="bg-light py-5 border-bottom mb-4">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-dark">
            <h1 class="display-4 fw-bolder">Thế Giới Tri Thức</h1>
            <p class="lead fw-normal text-muted mb-0">Hàng ngàn đầu sách mới đang chờ đón bạn</p>
        </div>
    </div>
</header>

<div class="container my-5">
    <h3 class="mb-4">Sách mới nhất</h3>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/200x280" class="card-img-top" alt="Book Cover">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Tên cuốn sách</h5>
                    <p class="text-danger fw-semibold">150.000đ</p>
                    <button class="btn btn-outline-dark btn-sm">Thêm vào giỏ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
