<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sách</title>
</head>
<body>

<h2>Danh sách sách</h2>

<a th:href="@{/books/create}">➕ Thêm sách</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Giá</th>
        <th>Thể loại</th>
        <th>Tác giả</th>
        <th>Số lượng</th>
        <th>Hành động</th>
    </tr>

    <tr th:each="b : ${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.name}"></td>
        <td th:text="${b.price}"></td>
        <td th:text="${b.category.name}"></td>
        <td th:text="${b.author.fullName}"></td>
        <td th:text="${b.stockQuantity}"></td>
        <td>
            <a th:href="@{/books/edit/{id}(id=${b.id})}">Sửa</a> |
            <a th:href="@{/books/update-quantity/{id}(id=${b.id})}">Nhập thêm số lượng</a> |
            <a th:href="@{/books/delete/{id}(id=${b.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
        </td>
    </tr>
</table>

</body>
</html>
