<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sách</title>

    <!-- Bootstrap + Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f7f6;
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 25px;
        }

        img {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="text-center py-4">
        <i class="fas fa-user-shield fa-3x text-warning"></i>
        <h5 class="mt-2 text-uppercase fw-bold">Admin</h5>
    </div>

    <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/authors"><i class="fas fa-user me-2"></i> Tác giả</a>
    <a href="/books" class="active"><i class="fas fa-book me-2"></i> Sách</a>
    <a href="/categories"><i class="fas fa-tags me-2"></i> Thể loại</a>
    <a href="/vouchers">
        <i class="fas fa-ticket-alt me-2"></i> Voucher
    </a>
    <a href="/admin/statistical">
        <i class="fas fa-chart-area me-2"></i> Thống kê
    </a>

    <hr class="mx-3">

    <a th:href="@{/home}">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <!-- FIX LOGOUT -->
    <form th:action="@{/logout}" method="post" class="px-3">
        <button type="submit" class="btn btn-link text-danger text-decoration-none">
            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
        </button>
    </form>
</div>

<!-- Main -->
<div class="main-content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">
            <i class="fas fa-book text-primary me-2"></i> Quản lý Sách
        </h2>

        <a th:href="@{/books/create}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i> Thêm sách
        </a>
    </div>

    <!-- Table -->
    <div class="table-container">

        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Ảnh</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Thể loại</th>
                <th>Tác giả</th>
                <th>Số lượng</th>
                <th class="text-center">Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${books}">
                <td class="text-muted">#<span th:text="${b.id}"></span></td>

                <td>
                    <img th:src="${b.image} != null ? @{${b.image}} : 'https://via.placeholder.com/80'"
                         width="60" height="80"
                         style="object-fit: cover;">
                </td>

                <td class="fw-semibold" th:text="${b.name}"></td>

                <td class="text-success fw-bold"
                    th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                </td>

                <td th:text="${b.category.name}"></td>
                <td th:text="${b.author.fullName}"></td>

                <td
                    th:text="${b.stockQuantity}">
                </td>

                <td class="text-center">
                    <div class="btn-group">

                        <a th:href="@{/books/edit/{id}(id=${b.id})}"
                           class="btn btn-sm btn-light border">
                            <i class="fas fa-pen text-primary"></i>
                        </a>
                        <a th:href="@{/books/update-quantity/{id}(id=${b.id})}"
                           class="btn btn-sm btn-light border"
                           title="Nhập thêm">
                            <i class="fas fa-box-open text-warning"></i>
                        </a>

                        <a th:href="@{/books/delete/{id}(id=${b.id})}"
                           class="btn btn-sm btn-light border"
                           onclick="return confirm('Bạn có chắc muốn xóa?')">
                            <i class="fas fa-trash text-danger"></i>
                        </a>

                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Empty -->
        <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
            <i class="fas fa-book-open fa-3x text-light mb-3"></i>
            <p class="text-muted">Chưa có sách nào.</p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
