<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Select2 CSS (CDN khác ổn định hơn) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>

</head>

<body>

<div class="container mt-4">
    <h2 class="mb-4">Thêm / Sửa sách</h2>

    <form th:action="${book.id} == null ? @{/books} : @{/books/update/{id}(id=${book.id})}"
          method="post"
          th:object="${book}">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Tên sách</label>
            <input type="text" class="form-control" th:field="*{name}" />
        </div>

        <!-- GIÁ -->
        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input type="number" class="form-control" th:field="*{price}" />
        </div>

        <div class="mb-3">
            <label class="form-label">Thể loại</label>
            <select th:field="*{categoryId}" class="form-select select2">
                <option value="">-- Chọn thể loại --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Tác giả</label>
            <select th:field="*{authorId}" class="form-select select2">
                <option value="">-- Chọn tác giả --</option>
                <option th:each="a : ${authors}"
                        th:value="${a.id}"
                        th:text="${a.fullName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number" class="form-control" th:field="*{stockQuantity}" />
        </div>

        <div class="mb-3">
            <label class="form-label">Ảnh (URL)</label>
            <input type="text" class="form-control" th:field="*{image}" />
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/books}" class="btn btn-secondary">Quay lại</a>

    </form>
</div>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>


<script>
    $(document).ready(function() {
        $('.select2').select2({
            placeholder: "Nhập thông tin để tìm kiếm",
            allowClear: true,
            minimumResultsForSearch: 0,
            width: '100%'
        });
    });
</script>

</body>
</html>
