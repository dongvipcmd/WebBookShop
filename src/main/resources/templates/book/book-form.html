<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Select2 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>

    <style>
        .preview-img {
            width: 150px;
            height: 200px;
            object-fit: cover;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-4">
    <h2 class="mb-4" th:text="${book.id} == null ? 'Thêm sách' : 'Sửa sách'"></h2>

    <form th:action="${book.id} == null ? @{/books} : @{/books/update/{id}(id=${book.id})}"
          method="post"
          enctype="multipart/form-data"
          th:object="${book}">

        <input type="hidden" th:field="*{id}" />

        <!-- TÊN -->
        <div class="mb-3">
            <label class="form-label">Tên sách</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>

        <!-- GIÁ -->
        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input type="number" class="form-control" th:field="*{price}" required/>
        </div>

        <!-- CATEGORY -->
        <div class="mb-3">
            <label class="form-label">Thể loại</label>
            <select th:field="*{categoryId}" class="form-select select2" required>
                <option value="">-- Chọn thể loại --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}">
                </option>
            </select>
        </div>

        <!-- AUTHOR -->
        <div class="mb-3">
            <label class="form-label">Tác giả</label>
            <select th:field="*{authorId}" class="form-select select2" required>
                <option value="">-- Chọn tác giả --</option>
                <option th:each="a : ${authors}"
                        th:value="${a.id}"
                        th:text="${a.fullName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number" class="form-control" th:field="*{stockQuantity}" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Ảnh sách</label>

            <div>
                <img id="preview"
                     th:src="${book.image} != null ? @{${book.image}} : 'https://via.placeholder.com/150'"
                     class="preview-img"/>
            </div>

            <input type="file" name="imageFile" class="form-control" accept="image/*"
                   onchange="previewImage(event)">
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/books}" class="btn btn-secondary">Quay lại</a>

    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>

<script>
    // Select2
    $(document).ready(function() {
        $('.select2').select2({
            placeholder: "Chọn...",
            allowClear: true,
            width: '100%'
        });
    });


    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

</body>
</html>
