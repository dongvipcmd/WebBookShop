<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật số lượng</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f7f6;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #212529;
            position: fixed;
            width: 240px;
            color: white;
        }

        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #ffc107;
            border-left: 4px solid #ffc107;
        }

        /* Main */
        .main-content {
            margin-left: 240px;
            padding: 40px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Card */
        .form-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="text-center py-4">
        <i class="fas fa-user-shield fa-3x text-warning"></i>
        <h5 class="mt-2 fw-bold">Admin</h5>
    </div>

    <a href="/admin"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/authors"><i class="fas fa-user me-2"></i> Tác giả</a>
    <a href="/books" class="active"><i class="fas fa-book me-2"></i> Sách</a>
    <a href="/categories"><i class="fas fa-tags me-2"></i> Thể loại</a>

    <hr class="mx-3">

    <a th:href="@{/home}">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <!-- Logout -->
    <form th:action="@{/logout}" method="post" class="px-3">
        <button type="submit" class="btn btn-link text-danger text-decoration-none">
            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
        </button>
    </form>
</div>

<!-- Main -->
<div class="main-content">

    <!-- Title -->
    <div class="w-100 mb-4" style="max-width: 500px;">
        <h2 class="fw-bold">
            <i class="fas fa-box-open text-primary me-2"></i>
            Cập nhật số lượng
        </h2>
    </div>

    <!-- Form -->
    <div class="form-container">

        <!-- Info -->
        <div class="info-box">
            <p class="mb-1">
                <strong>Tên sách:</strong>
                <span th:text="${book.name}"></span>
            </p>
            <p class="mb-0">
                <strong>Số lượng hiện tại:</strong>
                <span class="badge bg-info" th:text="${book.stockQuantity}"></span>
            </p>
        </div>

        <form th:action="@{/books/update-quantity/{id}(id=${book.id})}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nhập số lượng (+ / -)</label>
                <input type="number"
                       name="quantity"
                       class="form-control"
                       placeholder="VD: +10 hoặc -5"
                       required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check me-1"></i> Cập nhật
                </button>

                <a th:href="@{/books}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại
                </a>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
