<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cập nhật ảnh</title>
</head>
<body>

<h2>Cập nhật ảnh cho sách</h2>

<form th:action="@{/books/update-image/{id}(id=${book.id})}"
      method="post"
      enctype="multipart/form-data">

    <p>Tên sách: <span th:text="${book.name}"></span></p>

    <img th:src="@{${book.image}}" width="200"/>

    <br><br>

    <input type="file" name="imageFile" required>

    <br><br>

    <button type="submit">Upload</button>
</form>

</body>
</html>
