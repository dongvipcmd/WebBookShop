<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-body-wrapper">
    <div class="login-box">

        <h2 class="text-center login-title">Đăng kí</h2>

        <form th:action="@{/register}" method="post" th:object="${user}">

            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Tên đăng nhập</label>
                <input type="text" th:field="*{username}" class="form-control" required/>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Mật Khẩu</label>
                <input type="password" th:field="*{password}" class="form-control" required/>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2 text-center">
                <small th:text="${error}"></small>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Đăng ký</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none">
                Đã có tài khoản? Đăng nhập
            </a>
        </div>
        <div class="text-center mt-3">
            <a th:href="@{/home}" class="text-decoration-none">
                Trở lại trang chủ
            </a>
        </div>


    </div>
</div>

</body>
</html>
