<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-body-wrapper">

    <div class="login-box">
        <h2 class="text-center login-title">Đăng nhập</h2>

        <form th:action="@{/login}" method="post">

            <div th:if="${param.error}" class="alert alert-danger py-2 text-center" role="alert">
                <small>Tài khoản hoặc mật khẩu sai</small>
            </div>

            <div th:if="${param.logout}" class="alert alert-success py-2 text-center" role="alert">
                <small>Bạn đã đăng xuất</small>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold text-secondary">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Nhập tên tài khoản" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label small fw-semibold text-secondary">Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Nhập mật khẩu" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
            </div>
        </form>

        <div th:if="${successMessage}" class="alert alert-success py-2 text-center mt-3" role="alert">
            <small th:text="${successMessage}"></small>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/register}" class="text-decoration-none small register-link fw-semibold">
                Chưa có tài khoản? Đăng ký ngay
            </a>
        </div>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
